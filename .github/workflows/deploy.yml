name: Deploy CloudGuard AI
on:
  push:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    name: Build & Deploy to AWS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1
      AWS_REGION: ap-south-1
      CDK_DEFAULT_ACCOUNT: '656111643306'
      CDK_DEFAULT_REGION: ap-south-1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/dashboard/package-lock.json
            infrastructure/package-lock.json
      - name: Verify AWS credentials
        run: aws sts get-caller-identity
      - name: Install frontend dependencies
        working-directory: frontend/dashboard
        run: npm ci
      - name: Build React frontend
        working-directory: frontend/dashboard
        run: npm run build
      - name: Install CDK dependencies
        working-directory: infrastructure
        run: npm ci
      - name: Build CDK TypeScript
        working-directory: infrastructure
        run: npm run build
      - name: Deploy to AWS
        working-directory: infrastructure
        run: |
          for i in 1 2 3; do
            npx cdk deploy --require-approval never && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done